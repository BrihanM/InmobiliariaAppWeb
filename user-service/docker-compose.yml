version: '3.8'
services:
  db:
    image: postgres:18
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service_db
    ports:
      - 5435:5432
    volumes:
      - user_service_db_data:/var/lib/postgresql/data

volumes:
  user_service_db_data:
